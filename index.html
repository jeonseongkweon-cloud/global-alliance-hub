<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Global Alliance Hub | 공식 메인허브</title>
  <meta name="description" content="Global Alliance Hub 공식 메인허브. 모든 단체로 빠르게 이동하세요. 구조 >> 교차원리, 교차원리 기반 무도." />
  <meta name="theme-color" content="#0b0f19" />
  <meta name="robots" content="index,follow" />

  <!-- OG -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Global Alliance Hub | 공식 메인허브" />
  <meta property="og:description" content="모든 단체로 빠르게 이동하세요." />
  <meta property="og:image" content="" />

  <style>
    :root{
      --bg:#060914;
      --panel:rgba(9,14,30,.62);
      --panel2:rgba(6,10,24,.50);
      --stroke:rgba(88,166,255,.16);
      --stroke2:rgba(56,232,255,.22);
      --txt:rgba(235,245,255,.92);
      --muted:rgba(210,225,255,.70);
      --muted2:rgba(190,205,235,.60);
      --cyan:rgba(56,232,255,.95);
      --gold:rgba(215,184,106,.95);
      --danger:rgba(255,82,122,.95);
      --shadow:0 24px 90px rgba(0,0,0,.62);
      --r16:16px; --r20:20px; --r24:24px;
      --max:1100px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",Arial,sans-serif;
      color:var(--txt);
      background:
        radial-gradient(900px 520px at 25% 0%, rgba(56,232,255,.10), transparent 60%),
        radial-gradient(900px 700px at 80% 10%, rgba(215,184,106,.08), transparent 62%),
        radial-gradient(700px 700px at 50% 120%, rgba(56,232,255,.06), transparent 60%),
        linear-gradient(180deg, #050714 0%, #060914 50%, #050714 100%);
      overflow-x:hidden;
    }
    a{color:inherit; text-decoration:none}
    .container{width:min(var(--max), 92vw); margin:0 auto}
    .glass{
      border:1px solid var(--stroke);
      background:var(--panel);
      border-radius:var(--r24);
      box-shadow:var(--shadow);
      backdrop-filter: blur(14px);
    }
    .pill{
      display:inline-flex; align-items:center; gap:10px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(6,10,24,.38);
      color:var(--muted);
      font-weight:900;
      letter-spacing:.2px;
    }
    .dot{
      width:8px; height:8px; border-radius:999px;
      background:var(--cyan);
      box-shadow:0 0 14px rgba(56,232,255,.55);
    }

    /* Top */
    .topWrap{padding:18px 0 10px}
    .topCard{padding:16px 16px 14px}
    .brandRow{display:flex; gap:12px; align-items:center}
    .logoBox{
      width:46px; height:46px; border-radius:16px;
      border:1px solid var(--stroke2);
      background:
        radial-gradient(circle at 30% 35%, rgba(56,232,255,.26), transparent 55%),
        radial-gradient(circle at 70% 65%, rgba(215,184,106,.14), transparent 55%),
        rgba(6,10,24,.45);
      position:relative;
      overflow:hidden;
      flex:0 0 auto;
    }
    .logoBox::after{
      content:"";
      position:absolute; inset:-40%;
      background: conic-gradient(from 180deg, rgba(56,232,255,.0), rgba(56,232,255,.18), rgba(215,184,106,.10), rgba(56,232,255,.0));
      animation: spin 8s linear infinite;
      filter: blur(1px);
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .brandText{min-width:0}
    .brandTitle{
      margin:0;
      font-size:18px;
      font-weight:1000;
      letter-spacing:2px;
      text-transform:uppercase;
      line-height:1.1;
    }
    .brandSub{
      margin:6px 0 0;
      color:var(--muted2);
      font-weight:850;
      font-size:13px;
      line-height:1.35;
    }
    .frameLine{margin-top:12px}
    .frameLine .pill{width:100%; justify-content:flex-start}

    /* Quick */
    .section{margin-top:14px}
    .secHead{
      display:flex; align-items:flex-end; justify-content:space-between; gap:10px;
      margin:10px 4px 10px;
    }
    .secTitle{
      margin:0;
      font-size:16px;
      font-weight:1000;
      letter-spacing:.5px;
    }
    .secNote{
      margin:0;
      color:var(--muted2);
      font-size:12px;
      font-weight:850;
    }
    .quickGrid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .quickBtn{
      display:block;
      padding:14px 14px 12px;
      border-radius:18px;
      border:1px solid var(--stroke);
      background:rgba(6,10,24,.30);
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      min-height:78px;
    }
    .quickBtn:hover{transform: translateY(-1px); border-color:var(--stroke2); background:rgba(6,10,24,.38)}
    .quickBtn b{
      display:block;
      font-size:14px;
      font-weight:1000;
      letter-spacing:.2px;
      margin-bottom:6px;
    }
    .quickBtn span{
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient: vertical;
      overflow:hidden;
      color:var(--muted2);
      font-size:12px;
      font-weight:850;
      line-height:1.35;
    }

    /* Search + list actions */
    .tools{
      margin-top:12px;
      display:flex; gap:10px; flex-wrap:wrap;
      align-items:center;
    }
    .input{
      flex:1 1 220px;
      height:44px;
      border-radius:16px;
      border:1px solid var(--stroke);
      background:rgba(6,10,24,.32);
      color:var(--txt);
      padding:0 14px;
      font-weight:900;
      outline:none;
    }
    .btn{
      height:44px;
      padding:0 14px;
      border-radius:16px;
      border:1px solid var(--stroke);
      background:rgba(6,10,24,.28);
      color:var(--txt);
      font-weight:1000;
      cursor:pointer;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
      -webkit-tap-highlight-color: transparent;
      white-space:nowrap;
    }
    .btn:hover{transform: translateY(-1px); border-color:var(--stroke2); background:rgba(6,10,24,.36)}
    .btn.primary{border-color:rgba(56,232,255,.26); background:rgba(56,232,255,.10)}
    .btn.danger{border-color:rgba(255,82,122,.26); background:rgba(255,82,122,.10)}
    .metaRow{
      margin-top:10px;
      display:flex; gap:10px; flex-wrap:wrap;
      align-items:center; justify-content:space-between;
      color:var(--muted2);
      font-weight:850;
      font-size:12px;
    }

    /* Cards */
    .listWrap{margin-top:14px; padding:14px}
    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-top:10px;
    }
    .card{
      border-radius:22px;
      border:1px solid var(--stroke);
      background:rgba(6,10,24,.28);
      padding:14px;
    }
    .cardTop{
      display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
    }
    .cardTitle{
      margin:0;
      font-size:16px;
      font-weight:1000;
      letter-spacing:.2px;
      line-height:1.2;
    }
    .badge{
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(56,232,255,.22);
      background:rgba(56,232,255,.08);
      color:rgba(220,255,255,.92);
      font-weight:1000;
      font-size:12px;
      flex:0 0 auto;
      white-space:nowrap;
    }
    .tagline{
      margin:10px 0 10px;
      color:var(--muted);
      font-weight:850;
      line-height:1.45;
      font-size:13px;
    }
    .urlBox{
      border-radius:16px;
      border:1px solid rgba(88,166,255,.14);
      background:rgba(6,10,24,.30);
      padding:10px 12px;
      overflow:hidden;
      word-break:break-all;
      color:rgba(200,230,255,.82);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12.5px;
      font-weight:800;
    }
    .row2{
      margin-top:10px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .rowQuick{
      margin-top:10px;
      display:flex; gap:8px; flex-wrap:wrap;
    }
    .mini{
      height:36px;
      border-radius:14px;
      padding:0 12px;
      font-size:12px;
      font-weight:1000;
    }

    /* Footer */
    .footer{
      margin:14px 0 22px;
      padding:14px;
      color:var(--muted2);
      font-size:12px;
      font-weight:850;
      line-height:1.55;
    }

    /* Toast */
    #toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      padding:10px 12px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background:rgba(6,10,24,.70);
      color:var(--txt);
      font-weight:1000;
      font-size:12px;
      opacity:0;
      transition:opacity .15s ease;
      z-index:9999;
      pointer-events:none;
      box-shadow:0 18px 60px rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
    }

    /* Desktop slight upgrade */
    @media (min-width: 860px){
      .quickGrid{grid-template-columns:repeat(3,1fr)}
      .grid{grid-template-columns:repeat(2,1fr)}
      .brandTitle{font-size:20px}
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- TOP: "여기가 허브다"를 강하게 -->
    <section class="topWrap">
      <div class="glass topCard">
        <div class="brandRow">
          <div class="logoBox" aria-hidden="true"></div>
          <div class="brandText">
            <h1 class="brandTitle">GLOBAL ALLIANCE HUB</h1>
            <p class="brandSub">공식 메인허브 · 전체 단체 통합 대문</p>
          </div>
        </div>

        <div class="frameLine">
          <div class="pill"><span class="dot"></span><span>구조 >> 교차원리, 교차원리 기반 무도</span></div>
        </div>

        <!-- 내부 설명은 화면에 안 보이게: 필요하면 app.js에서만 사용 -->
        <p id="internalNote" style="display:none">
          이 페이지는 각 단체/프로젝트의 첫 관문입니다.
        </p>

        <!-- QUICK -->
        <div class="section">
          <div class="secHead">
            <h2 class="secTitle">빠른 이동</h2>
            <p class="secNote">자주 쓰는 6개 단체</p>
          </div>
          <div class="quickGrid" id="quickGrid"></div>

          <div class="tools">
            <input id="q" class="input" type="search" placeholder="단체/키워드 검색 (예: 뉴스24, 안전, 태권검도)" autocomplete="off" />
            <button class="btn" id="btnReset">초기화</button>
            <button class="btn primary" id="btnShareAll">전체 공유</button>
            <button class="btn danger" id="btnEmergencyCopy">긴급 스크립트 복사</button>
          </div>

          <div class="metaRow">
            <div>표시 중: <b id="count">0</b></div>
            <div>“바로가기/복사/퀵버튼”으로 빠르게 처리</div>
          </div>
        </div>
      </div>
    </section>

    <!-- LIST -->
    <section class="glass listWrap">
      <div class="secHead" style="margin:0 0 8px;">
        <h2 class="secTitle">단체 바로가기</h2>
        <p class="secNote">모든 카드가 아래에 표시됩니다</p>
      </div>

      <div class="grid" id="grid"></div>
    </section>

    <footer class="glass footer">
      <b>GLOBAL ALLIANCE HUB</b><br/>
      각 단체로 이동하는 공식 대문 페이지입니다. 언제든 이 허브로 돌아와 다시 이동할 수 있습니다.
    </footer>

  </div>

  <div id="toast">복사 완료</div>

  <!-- Data -->
  <script src="assets/data/links.js"></script>
  <!-- App -->
  <script src="assets/js/app.js"></script>
</body>
</html>
