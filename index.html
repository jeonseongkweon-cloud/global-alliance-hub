<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>GLOBAL ALLIANCE HUB | Official Gateway</title>
<meta name="description" content="구조 >> 교차원리, 교차원리 기반 무도 · 공식 메인 허브" />
<meta name="theme-color" content="#070a12" />
<link rel="stylesheet" href="assets/css/style.css" />

<style>

/* ===============================
   🔥 MOBILE CENTER LOCK CORE FIX
   =============================== */

.hero{
  display:flex;
  flex-direction:column;
  gap:20px;
  padding:18px;
}

.heroRight{
  display:flex;
  justify-content:center;
  align-items:center;
}

.orbit{
  position:relative;
  width:100%;
  max-width:460px;
  aspect-ratio:1/1;
  margin:auto;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 모든 핵심 요소 중앙 고정 */
.orbit .ring,
.orbit .core,
.orbit .orbitLinks,
.orbit .orbitNodes{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
}

/* 코어 항상 최상단 */
.core{
  z-index:50;
}

/* 노드가 코어를 침범하지 않도록 */
.orbitNodes{
  width:100%;
  height:100%;
}

/* 모바일에서 오비트가 잘리지 않게 */
@media (max-width:520px){
  .orbit{
    max-width:380px;
  }
}

</style>
</head>

<body>

<div class="wrap">

<header class="topbar">
  <div class="brand">
    <div class="mark"></div>
    <div class="brandText">
      <b>GLOBAL ALLIANCE HUB</b>
      <span>구조 >> 교차원리, 교차원리 기반 무도</span>
    </div>
  </div>

  <div class="actions">
    <button class="pill" id="btnPause">ORBIT</button>
    <button class="pill" id="btnCopyHub">LINK</button>
    <button class="pill" id="btnShareHub">SHARE</button>
    <button class="pill danger" id="btnEmergencyCopy">EMERGENCY</button>
    <button class="pill ghost" id="btnMenu">MENU</button>
  </div>
</header>

<main class="hero">

  <!-- LEFT -->
  <section class="panel heroLeft">
    <h1>공식 메인 대문</h1>
    <p>
      한 번의 터치로 전체 생태계를 이동합니다.<br>
      운영 프레임: <b>구조 >> 교차원리, 교차원리 기반 무도</b>
    </p>
  </section>

  <!-- RIGHT ORBIT -->
  <section class="panel heroRight">

    <div class="orbit" id="orbitArea">

      <div class="ring"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>

      <div class="core">
        <div>
          <b>CORE</b>
          <span>ALLIANCE GATE</span>
        </div>
      </div>

      <svg class="orbitLinks" id="orbitLinks"></svg>
      <div id="orbitNodes" class="orbitNodes"></div>

    </div>

  </section>

</main>

<section class="section">
  <div class="sectionHead">
    <h2>표시 중: <span id="count">0</span></h2>
  </div>
  <div class="grid" id="grid"></div>
</section>

<footer class="footer">
  © <span id="year"></span> GLOBAL ALLIANCE HUB
</footer>

</div>

<script src="assets/data/links.js"></script>
<script src="assets/js/app.js"></script>

<script>

/* ===============================
   🔥 ORBIT CENTER HARD LOCK JS
   =============================== */

(function(){

  function forceCenter(){
    const orbit = document.getElementById("orbitArea");
    if(!orbit) return;

    const nodes = document.getElementById("orbitNodes");
    if(!nodes) return;

    const r = orbit.getBoundingClientRect();
    const cx = r.width * 0.5;
    const cy = r.height * 0.5;

    const base = Math.min(r.width, r.height);
    const radius = base * 0.34;

    const list = nodes.querySelectorAll(".node");
    const total = list.length;

    list.forEach((node, i)=>{
      const angle = (Math.PI * 2 / total) * i;
      const x = cx + radius * Math.cos(angle);
      const y = cy + radius * Math.sin(angle);
      node.style.left = x + "px";
      node.style.top = y + "px";
      node.style.transform = "translate(-50%,-50%)";
    });
  }

  window.addEventListener("load", ()=>setTimeout(forceCenter,300));
  window.addEventListener("resize", forceCenter);

})();

</script>

</body>
</html>
